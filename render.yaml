# Render Blueprint — City Café Rewards
#
# Verified Render settings:
#   Root Directory : production/api
#   Build Command  : npm install
#   Start Command  : npm start  (runs node src/index.js)
#   Health Check   : /health
#
# After deploy, set DATABASE_URL in Render dashboard (Neon connection string).

services:
  - type: web
    name: city-cafe-rewards
    runtime: node
    rootDir: production/api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
