services:
  postgres:
    image: postgres:16-alpine
    container_name: citycafe-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: citycafe
      POSTGRES_PASSWORD: citycafe_dev
      POSTGRES_DB: citycafe
    ports:
      - "5432:5432"
    volumes:
      - citycafe_pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

volumes:
  citycafe_pg_data:
